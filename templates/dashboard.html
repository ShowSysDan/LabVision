<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtsVision Monitor Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 ArtsVision Monitor Dashboard</h1>
            <div class="header-actions">
                <button id="addMonitorBtn" class="btn btn-primary">+ Add Monitor</button>
                <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh Now</button>
                <span id="lastUpdate" class="last-update"></span>
            </div>
        </header>

        <div id="monitorsContainer" class="monitors-grid">
            <!-- Monitors will be dynamically added here -->
        </div>

        <div id="noMonitors" class="empty-state" style="display: none;">
            <h2>No monitors configured</h2>
            <p>Click "Add Monitor" to create your first monitor</p>
        </div>
    </div>

    <!-- Modal for Add/Edit Monitor -->
    <div id="monitorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Monitor</h2>
                <span class="close">&times;</span>
            </div>
            <form id="monitorForm">
                <input type="hidden" id="monitorId">
                
                <div class="form-group">
                    <label for="monitorName">Monitor Name *</label>
                    <input type="text" id="monitorName" required placeholder="e.g., Main Theater Monitor">
                </div>

                <div class="form-group">
                    <label for="monitorLocation">Location *</label>
                    <select id="monitorLocation" required>
                        <option value="">Select a location...</option>
                    </select>
                </div>

                <div class="form-section">
                    <h3>Webhook Configuration</h3>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="webhookEnabled">
                            Enable Webhook
                        </label>
                    </div>

                    <div id="webhookSettings" style="display: none;">
                        <div class="form-group">
                            <label for="webhookUrl">Webhook URL</label>
                            <input type="url" id="webhookUrl" placeholder="https://example.com/webhook">
                        </div>

                        <div class="form-group">
                            <label for="webhookMethod">HTTP Method</label>
                            <select id="webhookMethod">
                                <option value="POST">POST</option>
                                <option value="GET">GET</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="webhookHeaders">Headers (JSON)</label>
                            <textarea id="webhookHeaders" rows="3" placeholder='{"Content-Type": "application/json"}'></textarea>
                            <small>Optional: Custom headers as JSON object</small>
                        </div>

                        <div class="form-group">
                            <label for="webhookBodyTemplate">Body Template (for POST)</label>
                            <textarea id="webhookBodyTemplate" rows="4" placeholder="Optional: Use {monitor_name}, {location}, {is_active}, etc."></textarea>
                            <small>Available variables: monitor_id, monitor_name, location, is_active, current_event, next_event, timestamp</small>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Monitor</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
