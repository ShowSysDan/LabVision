<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtsVision Debug Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .debug-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .debug-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .debug-header h1 { font-size: 24px; }
        .debug-header .back-link { color: #94a3b8; text-decoration: none; }
        .debug-header .back-link:hover { color: #f8fafc; }

        .debug-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .debug-grid { grid-template-columns: 1fr; } }

        .debug-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 20px; overflow: hidden;
        }
        .debug-card h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
        .debug-card.full-width { grid-column: 1 / -1; }

        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #94a3b8; }
        .stat-value { color: #f8fafc; font-weight: 500; }
        .stat-value.good { color: #10b981; }
        .stat-value.warn { color: #fbbf24; }
        .stat-value.error { color: #ef4444; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { background: #334155; color: #cbd5e1; padding: 3px 10px; border-radius: 6px; font-size: 13px; }

        /* Log viewer */
        .log-controls { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .log-controls select, .log-controls button {
            background: #334155; border: 1px solid #475569; color: #f8fafc;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
        }
        .log-controls button:hover { background: #475569; }
        .log-controls .active { background: #3b82f6; border-color: #3b82f6; }
        .log-count { color: #64748b; font-size: 13px; margin-left: auto; }

        .log-entries {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px; line-height: 1.6; max-height: 600px; overflow-y: auto;
            padding: 12px;
        }
        .log-entry { padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
        .log-entry .ts { color: #64748b; }
        .log-entry .logger-name { color: #818cf8; }
        .log-entry.INFO .level { color: #10b981; }
        .log-entry.WARNING .level { color: #fbbf24; }
        .log-entry.ERROR .level { color: #ef4444; font-weight: 700; }
        .log-entry.DEBUG .level { color: #64748b; }
        .log-entry .msg { color: #e2e8f0; }
        .log-entry.ERROR .msg { color: #fca5a5; }
        .log-entry.WARNING .msg { color: #fde68a; }

        .monitor-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .monitor-table th { color: #64748b; text-align: left; padding: 6px 10px; border-bottom: 1px solid #334155; }
        .monitor-table td { color: #e2e8f0; padding: 6px 10px; border-bottom: 1px solid #1e293b; }
        .monitor-table .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
        }
        .badge.active { background: #064e3b; color: #10b981; }
        .badge.inactive { background: #1e293b; color: #64748b; }
        .badge.enabled { background: #172554; color: #60a5fa; }
        .badge.disabled { background: #1e293b; color: #475569; }

        .job-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 13px; }
        .job-row:last-child { border-bottom: none; }
        .job-id { color: #818cf8; font-weight: 500; }
        .job-next { color: #94a3b8; }

        .auto-refresh-toggle { display: flex; align-items: center; gap: 8px; }
        .auto-refresh-toggle label { color: #94a3b8; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="debug-container">
        <div class="debug-header">
            <h1>Debug Console</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="auto-refresh-toggle">
                    <input type="checkbox" id="autoRefresh" checked>
                    <label for="autoRefresh">Auto-refresh (5s)</label>
                </div>
                <a href="/" class="back-link">← Back to Dashboard</a>
            </div>
        </div>

        <!-- Status cards -->
        <div class="debug-grid">
            <div class="debug-card" id="apiCard">
                <h2>API Connection</h2>
                <div id="apiState">Loading...</div>
            </div>

            <div class="debug-card" id="schedulerCard">
                <h2>Scheduler Jobs</h2>
                <div id="schedulerState">Loading...</div>
            </div>

            <div class="debug-card" id="dataCard">
                <h2>Cached Data</h2>
                <div id="dataState">Loading...</div>
            </div>

            <div class="debug-card" id="monitorsCard">
                <h2>Monitors</h2>
                <div id="monitorsState">Loading...</div>
            </div>

            <div class="debug-card" id="locationsCard">
                <h2>Discovered Locations</h2>
                <div id="locationsState">Loading...</div>
            </div>

            <div class="debug-card" id="eventsCard">
                <h2>Events by Location</h2>
                <div id="eventsState">Loading...</div>
            </div>
        </div>

        <!-- Log viewer -->
        <div class="debug-card full-width">
            <h2>Application Logs</h2>
            <div class="log-controls">
                <button id="filterAll" class="active" onclick="setLogFilter(null)">All</button>
                <button id="filterError" onclick="setLogFilter('ERROR')">Errors</button>
                <button id="filterWarning" onclick="setLogFilter('WARNING')">Warnings</button>
                <button id="filterInfo" onclick="setLogFilter('INFO')">Info</button>
                <button id="filterDebug" onclick="setLogFilter('DEBUG')">Debug</button>
                <button onclick="refreshLogs()">↻ Refresh</button>
                <span id="logCount" class="log-count"></span>
            </div>
            <div id="logEntries" class="log-entries">
                Loading logs...
            </div>
        </div>
    </div>

    <script>
        let currentLogFilter = null;
        let autoRefreshInterval = null;

        // =====================================================================
        // State Loading
        // =====================================================================

        async function loadState() {
            try {
                const resp = await fetch('/api/debug/state');
                const state = await resp.json();
                renderApiCard(state);
                renderSchedulerCard(state);
                renderDataCard(state);
                renderMonitorsCard(state);
                renderLocationsCard(state);
                renderEventsCard(state);
            } catch (e) {
                console.error('Error loading state:', e);
            }
        }

        function renderApiCard(state) {
            const s = state.settings;
            const hasKey = s.api_key && !s.api_key.startsWith('****') && s.api_key !== '';
            const keyDisplay = s.api_key || '(not set)';
            document.getElementById('apiState').innerHTML = `
                <div class="stat-row"><span class="stat-label">API Key</span><span class="stat-value ${hasKey ? 'good' : 'error'}">${keyDisplay}</span></div>
                <div class="stat-row"><span class="stat-label">API URL</span><span class="stat-value">${s.api_url || '(not set)'}</span></div>
                <div class="stat-row"><span class="stat-label">SSL Verify</span><span class="stat-value">${s.verify_ssl ? 'On' : 'Off'}</span></div>
                <div class="stat-row"><span class="stat-label">Last Poll</span><span class="stat-value">${state.last_api_poll || 'Never'}</span></div>
            `;
        }

        function renderSchedulerCard(state) {
            if (!state.scheduler_jobs || state.scheduler_jobs.length === 0) {
                document.getElementById('schedulerState').innerHTML = '<div class="stat-value warn">No jobs scheduled</div>';
                return;
            }
            document.getElementById('schedulerState').innerHTML = state.scheduler_jobs.map(j => `
                <div class="job-row">
                    <span class="job-id">${j.id}</span>
                    <span class="job-next">${j.next_run ? new Date(j.next_run).toLocaleString() : 'N/A'}</span>
                </div>
            `).join('');
        }

        function renderDataCard(state) {
            document.getElementById('dataState').innerHTML = `
                <div class="stat-row"><span class="stat-label">Locations</span><span class="stat-value ${state.locations_count > 0 ? 'good' : 'warn'}">${state.locations_count}</span></div>
                <div class="stat-row"><span class="stat-label">Cached Events</span><span class="stat-value ${state.cached_events_count > 0 ? 'good' : 'warn'}">${state.cached_events_count}</span></div>
                <div class="stat-row"><span class="stat-label">API Entities</span><span class="stat-value">${state.entities ? state.entities.length : 0}</span></div>
                <div class="stat-row"><span class="stat-label">Event Fields</span><span class="stat-value">${state.event_field_count}</span></div>
            `;
        }

        function renderMonitorsCard(state) {
            if (!state.monitors || state.monitors.length === 0) {
                document.getElementById('monitorsState').innerHTML = '<div class="stat-value" style="color:#64748b;">No monitors configured</div>';
                return;
            }
            document.getElementById('monitorsState').innerHTML = `
                <table class="monitor-table">
                    <tr><th>Name</th><th>Location</th><th>Status</th><th>Enabled</th><th>Display</th></tr>
                    ${state.monitors.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td>${m.location}</td>
                            <td><span class="badge ${m.is_active ? 'active' : 'inactive'}">${m.is_active ? 'ACTIVE' : 'IDLE'}</span></td>
                            <td><span class="badge ${m.enabled ? 'enabled' : 'disabled'}">${m.enabled ? 'YES' : 'NO'}</span></td>
                            <td><span class="badge ${m.display_enabled ? 'enabled' : 'disabled'}">${m.display_enabled ? 'YES' : 'NO'}</span></td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        function renderLocationsCard(state) {
            if (!state.locations || state.locations.length === 0) {
                document.getElementById('locationsState').innerHTML = '<div class="stat-value warn">No locations discovered</div>';
                return;
            }
            document.getElementById('locationsState').innerHTML = `
                <div class="tag-list">${state.locations.map(l => `<span class="tag">${l}</span>`).join('')}</div>
            `;
        }

        function renderEventsCard(state) {
            const ebl = state.events_by_location;
            if (!ebl || Object.keys(ebl).length === 0) {
                document.getElementById('eventsState').innerHTML = '<div class="stat-value warn">No cached events</div>';
                return;
            }
            const sorted = Object.entries(ebl).sort((a, b) => b[1] - a[1]);
            document.getElementById('eventsState').innerHTML = sorted.map(([loc, count]) => `
                <div class="stat-row"><span class="stat-label">${loc}</span><span class="stat-value">${count}</span></div>
            `).join('');
        }

        // =====================================================================
        // Log Viewer
        // =====================================================================

        async function refreshLogs() {
            try {
                let url = '/api/debug/logs?limit=300';
                if (currentLogFilter) url += '&level=' + currentLogFilter;
                const resp = await fetch(url);
                const data = await resp.json();
                renderLogs(data.entries);
                document.getElementById('logCount').textContent = `${data.entries.length} shown / ${data.total} total`;
            } catch (e) {
                console.error('Error loading logs:', e);
            }
        }

        function renderLogs(entries) {
            const container = document.getElementById('logEntries');
            if (!entries || entries.length === 0) {
                container.innerHTML = '<div style="color:#64748b;">No log entries</div>';
                return;
            }
            // Show newest at bottom, auto-scroll
            const wasScrolled = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
            container.innerHTML = entries.map(e => {
                const parts = e.message.split(' - ');
                const ts = e.timestamp;
                const loggerName = e.logger;
                const level = e.level;
                // Get the message portion (everything after "LEVEL - ")
                const msgIdx = e.message.indexOf(level);
                const msg = msgIdx >= 0 ? e.message.substring(msgIdx + level.length + 3) : e.message;
                return `<div class="log-entry ${level}"><span class="ts">${ts}</span> <span class="logger-name">${loggerName}</span> <span class="level">${level}</span> <span class="msg">${escapeHtml(msg)}</span></div>`;
            }).join('');
            if (wasScrolled) container.scrollTop = container.scrollHeight;
        }

        function setLogFilter(level) {
            currentLogFilter = level;
            document.querySelectorAll('.log-controls button').forEach(b => b.classList.remove('active'));
            const id = level ? 'filter' + level.charAt(0) + level.slice(1).toLowerCase() : 'filterAll';
            const btn = document.getElementById(id);
            if (btn) btn.classList.add('active');
            refreshLogs();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =====================================================================
        // Auto-refresh
        // =====================================================================

        function toggleAutoRefresh() {
            if (document.getElementById('autoRefresh').checked) {
                autoRefreshInterval = setInterval(() => { loadState(); refreshLogs(); }, 5000);
            } else {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);

        // =====================================================================
        // Initialize
        // =====================================================================

        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            refreshLogs();
            toggleAutoRefresh();
        });
    </script>
</body>
</html>
